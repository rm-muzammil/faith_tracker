<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Faith Tracker — Offline</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #09090b;
      color: #f4f4f5;
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      text-align: center;
      padding: 2rem;
    }
    .icon { font-size: 3rem; margin-bottom: 1rem; }
    h1 { font-size: 1.25rem; font-weight: 700; margin-bottom: 0.5rem; color: #22c55e; }
    p { font-size: 0.875rem; color: #71717a; line-height: 1.6; }
    .retry {
      margin-top: 1.5rem;
      background: #22c55e;
      color: #09090b;
      border: none;
      padding: 0.625rem 1.5rem;
      border-radius: 0.75rem;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="icon">🌙</div>
  <h1>You're offline</h1>
  <p>
    Faith Tracker needs a connection to sync.<br />
    Your last data is cached and will sync when you're back online.
  </p>
  <button class="retry" onclick="window.location.reload()">Try again</button>
</body>
</html>
